<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS 실습용 테스트 페이지</title>
    <style>
        /* CSS 스타일링 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }
        .container {
            background-color: deepskyblue;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .aws-logo {
            color: #ff9900;
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        h1 {
            font-size: 1.5rem;
            color: #232f3e;
            margin-bottom: 20px;
        }
        p {
            font-size: 1rem;
            color: white;
            line-height: 1.5;
        }
        .status-badge {
            display: inline-block;
            background-color: #2ecc71;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            margin-top: 15px;
        }
        button {
            background-color: #232f3e;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 25px;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #ff9900;
            color: #232f3e;
        }
        .timestamp {
            margin-top: 15px;
            font-size: 0.8rem;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="aws-logo">AWS</div>
        <h1>AWS 실습용 페이지</h1>
        <p>이 화면이 보인다면 AWS 인프라(S3, EC2, CloudFront 등) 또는 GitHub 배포가 정상적으로 완료된 것입니다.</p>
        <span class="status-badge">상태: 정상 구동중</span>
        
        <br>
        <button id="actionBtn">클릭해서 JS 작동 확인</button>
        <div class="timestamp" id="timeDisplay"></div>
    </div>

    <script>
        // JavaScript 로직
        document.getElementById('actionBtn').addEventListener('click', function() {
            const now = new Date();
            const timeString = now.toLocaleTimeString();
            
            // 화면에 시간 표시 및 알림
            document.getElementById('timeDisplay').innerText = '마지막 확인 시간: ' + timeString;
            alert('자바스크립트가 성공적으로 실행되었습니다!\n현재 시간: ' + timeString);
        });
    </script>
</body>
</html>
