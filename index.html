<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS 클라우드 인프라 대시보드</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { background: #ffffff; width: 100%; max-width: 800px; border-radius: 12px; padding: 40px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; margin-bottom: 30px; font-size: 28px; }
        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .card { background: #ffffff; border: 2px solid #e1e8ed; border-radius: 10px; padding: 25px; text-align: center; text-decoration: none; color: inherit; transition: all 0.3s ease; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .card:hover:not(.main-title) { transform: translateY(-5px); border-color: #3498db; box-shadow: 0 5px 15px rgba(52,152,219,0.2); }
        .card h2 { font-size: 22px; margin-bottom: 10px; color: #2c3e50; }
        .card p { font-size: 14px; color: #7f8c8d; margin-bottom: 15px; }
        .btn { background-color: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 5px; font-size: 14px; cursor: pointer; }
        .card.main-title { background: #34495e; border: none; color: white; }
        .card.main-title h2 { color: #ffffff; }
        .card.main-title p { color: #bdc3c7; }
    </style>
</head>
<body>
    <div class="container">
        <h1>클라우드 인프라 관리</h1>
        <div class="grid-container">
            <div class="card main-title">
                <h2>Core Stack</h2>
                <p>Ubuntu · MySQL · Docker</p>
            </div>
            <!-- 🚀 href 경로 뒤의 .html을 모두 제거했습니다 -->
            <a href="ubuntu" class="card">
                <h2>Ubuntu</h2>
                <p>리눅스 서버 운영체제</p>
                <span class="btn">상세 보기</span>
            </a>
            <a href="mysql" class="card">
                <h2>MySQL</h2>
                <p>관계형 데이터베이스(RDBMS)</p>
                <span class="btn">상세 보기</span>
            </a>
            <a href="docker" class="card">
                <h2>Docker</h2>
                <p>컨테이너 기반 가상화 플랫폼</p>
                <span class="btn">상세 보기</span>
            </a>
        </div>
    </div>
</body>
</html>
